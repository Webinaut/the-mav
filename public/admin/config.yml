backend:
  name: github
  repo: Webinaut/the-mav
  branch: main
  base_url: https://netlify.com
media_folder: "src/assets/images"
public_folder: "/src/assets/images"
media_folder_relative: true
publish_mode: editorial_workflow

collections:
  - name: "articles"
    label: "Articles"
    folder: "src/content/articles"
    create: true
    media_folder: "./"
    public_folder: "./"

    # 1. FIXED MDX SPECIFIC PARSING RULES
    extension: "mdx"
    format: "frontmatter" # This is the exact keyword needed for MDX files

    slug: "{{title}}"
    path: "{{slug}}/index"

    fields:
      - {
          label: "Layout",
          name: "layout",
          widget: "hidden",
          default: "src/layouts/BlogPostLayout.astro",
        }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - {
          label: "Ranking",
          name: "ranking",
          widget: "number",
          value_type: "float",
        }
      - { label: "Post Image", name: "hero", widget: "image" }
      - { label: "Image Caption", name: "caption", widget: "string" }
      - { label: "Articles Page Summary", name: "summary", widget: "text" }
      - { label: "Tags", name: "tags", widget: "list", default: ["articles"] }

      # 2. FIXED EMPTY FALLBACK FOR NEW MDX POSTS
      - {
          label: "Body",
          name: "body",
          widget: "markdown",
          default: "", # Guarantees a clean initialization for new posts
          editor_components: ["floated-image"],
        }
    sortable_fields: ["title", "ranking", "tags"]
