backend:
  name: github
  repo: Webinaut/the-mav
  branch: main
  base_url: https://netlify.com
media_folder: "src/assets/images"
public_folder: "/src/assets/images"
media_folder_relative: true
publish_mode: editorial_workflow

collections:
  - name: "articles"
    label: "Articles"
    folder: "src/content/articles"
    create: true
    media_folder: "./"
    public_folder: "./"
    extension: "mdx"
    format: "frontmatter"
    frontmatter_delimiter: "---"
    body_field: "body"
    slug: "{{title}}"
    path: "{{slug}}/index"

    fields:
      - {
          label: "Layout",
          name: "layout",
          widget: "hidden",
          default: "src/layouts/BlogPostLayout.astro",
        }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - {
          label: "Ranking",
          name: "ranking",
          widget: "number",
          value_type: "float",
        }
      - { label: "Views", name: "view_count", widget: "number", default: 0 }
      - { label: "Post Image", name: "hero", widget: "image" }
      - { label: "Image Caption", name: "caption", widget: "string" }
      - { label: "Articles Page Summary", name: "summary", widget: "text" }
      - { label: "Tags", name: "tags", widget: "list", default: ["articles"] }

      # FIX: Must be "markdown" widget type to render custom block shortcodes accurately
      - {
          label: "Body",
          name: "body",
          widget: "markdown",
          editor_components: ["floated-image"],
        }
    sortable_fields: ["title", "ranking", "view_count"]
