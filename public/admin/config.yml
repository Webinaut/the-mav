backend:
  name: github
  repo: Webinaut/the-mav
  branch: main
  base_url: https://netlify.com
# Tells Sveltia to upload assets straight into the directory of the post being edited
media_folder: "src/content/articles/{{slug}}"
public_folder: "./"
media_folder_relative: true
publish_mode: editorial_workflow

collections:
  - name: "articles"
    label: "Articles"
    folder: "src/content/articles"
    create: true
    media_folder: "./"
    public_folder: "./"

    # FIX A: Change extension back to standard md for native Sveltia parser stability
    extension: "md"
    format: "yaml-frontmatter" # This isolates frontmatter flawlessly from standard md text
    body_field: "body"
    slug: "{{title}}"
    path: "{{slug}}/index"

    fields:
      - {
          label: "Layout",
          name: "layout",
          widget: "hidden",
          default: "src/layouts/BlogPostLayout.astro",
        }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - {
          label: "Ranking",
          name: "ranking",
          widget: "number",
          value_type: "float",
        }
      - { label: "Views", name: "view_count", widget: "number", default: 0 }
      - { label: "Post Image", name: "hero", widget: "image" }
      - { label: "Image Caption", name: "caption", widget: "string" }
      - { label: "Articles Page Summary", name: "summary", widget: "text" }
      - { label: "Tags", name: "tags", widget: "list", default: ["articles"] }

      # FIX B: Use the standard stable Markdown widget layout block
      - {
          label: "Body",
          name: "body",
          widget: "markdown",

          # FIX A: Explicitly tell Sveltia to render your custom tool button block
          editor_components: ["floated-image"],

          # FIX B: Activates the formatting toolbar buttons. Sveltia requires this list to include custom tools!
          buttons: [
              "bold",
              "italic",
              "link",
              "heading-one",
              "heading-two",
              "quote",
              "code",
              "bulleted-list",
              "numbered-list",
              "floated-image", # <-- This injects your tool right into the toolbar block
            ],

          modes: ["rich_text", "raw"],
        }

    sortable_fields: ["title", "ranking", "view_count"]
