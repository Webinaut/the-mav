backend:
  name: github
  repo: Webinaut/the-mav
  branch: main # or master
  base_url: https://api.netlify.com
# 1. FORCE DECAP TO USE LOCAL RELATIVE PATHS FOR PREVIEWS
media_folder: "src/assets/images"
public_folder: "/src/assets/images"
media_folder_relative: true # Enables relative paths globally
# publish_mode: editorial_workflow

collections:
  - name: "articles"
    label: "Articles"
    folder: "src/content/articles"
    create: true
    media_folder: "./"
    public_folder: "./"
    path: "{{slug}}/index"
    extension: "mdx"

    # FORCE CORRECT DELIMITER DETECTION FOR MDX
    format: "frontmatter"
    body_field: "body" # Tells Sveltia exactly which widget handles the markdown string

    fields:
      - {
          label: "Layout",
          name: "layout",
          widget: "hidden",
          default: "src/layouts/BlogPostLayout.astro",
        }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - {
          label: "Ranking",
          name: "ranking",
          widget: "number",
          value_type: "float",
        }
      - { label: "Post Image", name: "hero", widget: "image" }
      - { label: "Image Caption", name: "caption", widget: "string" }
      - { label: "Articles Page Summary", name: "summary", widget: "text" }
      - { label: "Tags", name: "tags", widget: "list", default: ["articles"] }
      - {
          label: "Body",
          name: "body", # Matches body_field target option above
          widget: "markdown",
          editor_components: ["floated-image"],
        }
    sortable_fields: ["title", "ranking", "tags"]
