<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
    <title>Content Manager</title>
    <!-- <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script> -->
  </head>
  <body>
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js">
                             CMS.registerEditorComponent({
        id: 'floated-image',
        label: 'Floated Image',
        icon: 'image',
        fields: [
          { name: 'image', label: 'Select Image', widget: 'image', required: true },
          { name: 'alt', label: 'Alt Text', widget: 'string', required: true },
          {
            name: 'align',
            label: 'Alignment',
            widget: 'select',
            options: [
              { label: 'Float Left', value: 'left' },
              { label: 'Float Right', value: 'right' },
              { label: 'Center', value: 'center' }
            ],
            default: 'right'
          }
        ],

        // Strict, isolated match for the modern MDX component block tag
        pattern: /^<FloatedImage\s+src="([^"]+)"\s+alt="([^"]*)"\s+align="([^"]+)"\s*\/?>$/,

        // Maps the sequential regex capture groups perfectly to the form inputs
        fromBlock: function(match) {
          return {
            image: match[1],
            alt: match[2],
            align: match[3]
          };
        },

        // Saves a clean MDX data block tag directly to your index.mdx file
        toBlock: function(data) {
          return `<FloatedImage src="${data.image}" alt="${data.alt}" align="${data.align}" />`;
        },

        // Controls how it draws inside Sveltia's internal preview dashboard box
        toPreview: function(data) {
          return `<div style="float: ${data.align}; max-width: 45%; margin: 1em;"><img src="${data.image}" alt="${data.alt}" style="width:100%; display:block;"/></div>`;
        }
      });
    </script>
  </body>
</html>
