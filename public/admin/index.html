<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
    <title>Content Manager</title>
  </head>
  <body>
    <!-- STEP 1: Load Sveltia CMS library from the external source CDN -->
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>

    <!-- STEP 2: Create a completely separate, dedicated script tag for your custom plugin -->
    <script>
      window.CMS = window.CMS || {};

      if (typeof CMS !== "undefined" && CMS.registerEditorComponent) {
        CMS.registerEditorComponent({
          id: "floated-image",
          label: "Floated Image",
          icon: "image",
          fields: [
            {
              name: "image",
              label: "Select Image",
              widget: "image",
              required: true,
            },
            {
              name: "alt",
              label: "Alt Text",
              widget: "string",
              required: true,
            },
            {
              name: "align",
              label: "Alignment",
              widget: "select",
              options: [
                { label: "Float Left", value: "left" },
                { label: "Float Right", value: "right" },
                { label: "Center", value: "center" },
              ],
              default: "right",
            },
            {
              name: "size_class",
              label: "Image Display Style",
              widget: "select",
              options: [
                {
                  label: "Small Width (30%) + Normal Margin",
                  value: "size-small_margin-normal",
                },
                {
                  label: "Medium Width (45%) + Normal Margin",
                  value: "size-medium_margin-normal",
                },
                {
                  label: "Large Width (60%) + Extra Margin",
                  value: "size-large_margin-wide",
                },
                { label: "Full Width (100%)", value: "size-full" },
              ],
              default: "size-medium_margin-normal",
            },
          ],

          // FIX: Completely universal pattern that captures paths with OR without the relative dot-slash safely
          pattern:
            /!\[(?<alt>[^\]]*)\]\((?<image>[^)#]+)#(?<align>left|right|center)_(?<size_class>[a-zA-Z0-9_-]+)\)/,

          toBlock: function (data) {
            // Ensures a clean, relative dot-slash path is written out to satisfy Astro's compiler
            let cleanImage = data.image;
            if (
              !cleanImage.startsWith("./") &&
              !cleanImage.startsWith("/") &&
              !cleanImage.startsWith("http")
            ) {
              cleanImage = `./${cleanImage}`;
            }
            return `![${data.alt}](${cleanImage}#${data.align}_${data.size_class})`;
          },

          toPreview: function (data) {
            const isCenter = data.align === "center";
            return `<div style="float: ${isCenter ? "none" : data.align}; margin: 1em auto; max-width: 50%; border: 1px dashed #ccc; padding: 4px;">
            <img src="${data.image}" alt="${data.alt}" style="width:100%; display:block;"/>
            <small style="display:block; text-align:center; color:#666;">[${data.align} | ${data.size_class}]</small>
          </div>`;
          },
        });
      }
    </script>
  </body>
</html>
