<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
    <title>Content Manager</title>
    <!-- <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script> -->
  </head>
  <body>
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js">
              CMS.registerEditorComponent({
        id: 'floated-image',
        label: 'Floated Image',
        icon: 'image',
        fields: [
          { name: 'image', label: 'Select Image', widget: 'image', required: true },
          { name: 'alt', label: 'Alt Text', widget: 'string', required: true },
          {
            name: 'align',
            label: 'Alignment',
            widget: 'select',
            options: [
              { label: 'left', value: 'left' },
              { label: 'right', value: 'right' },
              { label: 'center', value: 'center' }
            ],
            default: 'right'
          }
        ],

        // FIX: Uses a safe shortcode RegExp pattern with named capture groups
        pattern: /^\[floated-image\s+image="(?<image>[^"]+)"\s+alt="(?<alt>[^"]*)"\s+align="(?<align>[^"]+)"\s*\]$/,

        // Sveltia auto-maps variables out of the named capture groups above

        toBlock: function(data) {
          return `[floated-image image="${data.image}" alt="${data.alt}" align="${data.align}"]`;
        },

        toPreview: function(data) {
          return `<div style="float: ${data.align}; max-width: 45%; margin: 1em;"><img src="${data.image}" alt="${data.alt}" style="width:100%; display:block;"/></div>`;
        }
      });
    </script>
  </body>
</html>
