<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
    <title>Content Manager</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/decap-cms@^3.1.2/dist/decap-cms.js"></script>
  </head>
  <body>
    <script>
      const BlogPreview = createClass({
        render: function () {
          const entry = this.props.entry;
          const getAsset = this.props.getAsset;

          // 1. Fetch text data safely
          const title = entry.getIn(["data", "title"]);

          // 2. Safely capture the compiled widget container directly from the React props layer.
          // This natively invokes the parser without relying on CMS.getWidget lookups.
          const compiledBody = this.props.widgetFor("body");

          return h(
            "div",
            {
              style: {
                padding: "20px",
                fontFamily: "sans-serif",
                maxWidth: "800px",
                margin: "0 auto",
              },
            },
            h("h1", null, title),
            h("hr", null),
            // 3. Render the widget container inside our custom wrapper layout
            h("div", { className: "markdown-body" }, compiledBody),
          );
        },
      });

      // Register specifically to your blog collection
      CMS.registerPreviewTemplate("articles", BlogPreview);

      // Inject iframe responsive styling rules securely
      CMS.registerPreviewStyle(
        `
      .markdown-body img {
        max-width: 100% !important;
        height: auto !important;
        border-radius: 6px;
        display: block;
        margin: 1.5rem 0;
      }
    `,
        { raw: true },
      );
    </script>
  </body>
</html>
