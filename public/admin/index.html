<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
    <title>Content Manager</title>
  </head>
  <body>
    <!-- STEP 1: Load Sveltia CMS library from the external source CDN -->
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>

    <!-- STEP 2: Create a completely separate, dedicated script tag for your custom plugin -->
    <script>
      window.CMS = window.CMS || {};

      if (typeof CMS !== "undefined" && CMS.registerEditorComponent) {
        CMS.registerEditorComponent({
          id: "floated-image",
          label: "Floated Image",
          icon: "image",
          fields: [
            {
              name: "image",
              label: "Select Image",
              widget: "image",
              required: true,
            },
            {
              name: "alt",
              label: "Alt Text",
              widget: "string",
              required: true,
            },
            {
              name: "align",
              label: "Alignment",
              widget: "select",
              options: [
                { label: "Float Left", value: "left" },
                { label: "Float Right", value: "right" },
                { label: "Center", value: "center" },
              ],
              default: "right",
            },
            {
              name: "size_class",
              label: "Image Display Style",
              widget: "select",
              options: [
                {
                  label: "Small Width (30%) + Normal Margin",
                  value: "size-small_margin-normal",
                },
                {
                  label: "Medium Width (45%) + Normal Margin",
                  value: "size-medium_margin-normal",
                },
                {
                  label: "Large Width (60%) + Extra Margin",
                  value: "size-large_margin-wide",
                },
                { label: "Full Width (100%)", value: "size-full" },
              ],
              default: "size-medium_margin-normal",
            },
          ],

          // NEW PATTERN: Looks for a raw native HTML img tag with our custom marker class
          pattern:
            /<img\s+src="(?<image>[^"]*)"\s+alt="(?<alt>[^"]*)"\s+class="cms-floated-image\s+align-(?<align>[^\s"]*)\s+(?<size_class>[^"]*)"\s*\/>/,

          fromBlock: function (match) {
            return {
              image: match.groups.image || "",
              alt: match.groups.alt || "",
              align: match.groups.align || "right",
              size_class:
                match.groups.size_class || "size-medium_margin-normal",
            };
          },

          toBlock: function (data) {
            let cleanImage = data.image || "";
            // Astro 5 asset pipelines route public uploads paths relative from the public directory
            if (cleanImage.startsWith("./")) {
              cleanImage = cleanImage.replace("./", "/");
            }
            if (!cleanImage.startsWith("/") && !cleanImage.startsWith("http")) {
              cleanImage = `/${cleanImage}`;
            }

            const parts = (
              data.size_class || "size-medium_margin-normal"
            ).split("_");
            const size = parts[0] || "size-medium";
            const margin = parts[1] || "margin-normal";

            return `<img src="${cleanImage}" alt="${data.alt || ""}" class="cms-floated-image align-${data.align || "right"} ${size} ${margin}" />`;
          },

          toPreview: function (data) {
            const isCenter = data.align === "center";
            const floatValue = isCenter ? "none" : data.align;
            const marginValue = isCenter
              ? "1.5rem auto"
              : "0.5rem 1.5rem 1rem 1.5rem";

            let widthPercent = "45%";
            if (data.size_class?.includes("small")) widthPercent = "30%";
            if (data.size_class?.includes("large")) widthPercent = "60%";
            if (data.size_class?.includes("full")) widthPercent = "100%";

            return `<div style="float: ${floatValue}; max-width: ${widthPercent}; width: ${widthPercent}; margin: ${marginValue}; box-sizing: border-box; display: inline-block;">
            <img src="${data.image || ""}" alt="${data.alt || ""}" style="width:100%; height:auto; display:block; border-radius:6px;"/>
          </div>`;
          },
        });
      }
    </script>
  </body>
</html>
