<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
    <title>Content Manager</title>
    <!-- <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script> -->
  </head>
  <body>
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js">
      // Wrap inside an assignment lookup to prevent loading execution race-conditions
        window.CMS = window.CMS || {};

        if (typeof CMS !== 'undefined' && CMS.registerEditorComponent) {
          CMS.registerEditorComponent({
            id: 'floated-image',
            label: 'Floated Image',
            icon: 'image',
            fields: [
              { name: 'image', label: 'Select Image', widget: 'image', required: true },
              { name: 'alt', label: 'Alt Text', widget: 'string', required: true },
              {
                name: 'align',
                label: 'Alignment',
                widget: 'select',
                options: [
                  { label: 'Float Left', value: 'left' },
                  { label: 'Float Right', value: 'right' },
                  { label: 'Center', value: 'center' }
                ],
                default: 'right'
              }
            ],

            // Loose regex tracking pattern
            pattern: /!\[(?<alt>[^\]]*)\]\((?<image>[^)#]+)#(?<align>left|right|center)\)/,

            toBlock: function(data) {
              return `![${data.alt}](${data.image}#${data.align})`;
            },

            toPreview: function(data) {
              return `<div style="float: ${data.align}; max-width: 45%; margin: 1em;"><img src="${data.image}" alt="${data.alt}" style="width:100%; display:block;"/></div>`;
            }
          });
        }
    </script>
  </body>
</html>
