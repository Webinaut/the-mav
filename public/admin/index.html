<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
    <title>Content Manager</title>
  </head>
  <body>
    <!-- STEP 1: Load Sveltia CMS library from the external source CDN -->
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>

    <script>
      window.CMS = window.CMS || {};

      if (typeof CMS !== "undefined" && CMS.registerEditorComponent) {
        CMS.registerEditorComponent({
          id: "floated-image",
          label: "Floated Image",
          icon: "image",
          fields: [
            {
              name: "image",
              label: "Select Image",
              widget: "image",
              required: true,
            },
            {
              name: "alt",
              label: "Alt Text",
              widget: "string",
              required: true,
            },
            {
              name: "align",
              label: "Alignment",
              widget: "select",
              options: [
                { label: "Float Left", value: "left" },
                { label: "Float Right", value: "right" },
                { label: "Center", value: "center" },
              ],
              default: "right",
            },
            {
              name: "size_class",
              label: "Image Display Style",
              widget: "select",
              options: [
                {
                  label: "Small Width (30%) + Normal Margin",
                  value: "size-small_margin-normal",
                },
                {
                  label: "Medium Width (45%) + Normal Margin",
                  value: "size-medium_margin-normal",
                },
                {
                  label: "Large Width (60%) + Extra Margin",
                  value: "size-large_margin-wide",
                },
                { label: "Full Width (100%)", value: "size-full" },
              ],
              default: "size-medium_margin-normal",
            },
          ],

          // REGEX PATTERN: Captures your text details and layout settings using a pipe separator format
          pattern:
            /!\[(?<alt>[^|\]]*)(?:\|\s*(?<align>left|right|center)\s*\|\s*(?<size_class>[a-zA-Z0-9_-]+))?\]\((?:\.\/)?(?<image>[^)\s]+)\)/,

          fromBlock: function (match) {
            const fileFragment = match.groups.image.split("/").pop();
            return {
              alt: (match.groups.alt || "").trim(),
              image: `./${fileFragment}`,
              align: match.groups.align || "right",
              size_class:
                match.groups.size_class || "size-medium_margin-normal",
            };
          },

          toBlock: function (data) {
            const fileFragment = (data.image || "").split("/").pop();
            const cleanImage = `./${fileFragment}`;
            const cleanAlt = (data.alt || "").replace("|", "").trim();
            const align = data.align || "right";
            const size = data.size_class || "size-medium_margin-normal";

            // Returns valid markdown syntax that Astro 5 parses and optimizes automatically
            return `![${cleanAlt} | ${align} | ${size}](${cleanImage})`;
          },

          toPreview: function (data) {
            const fileFragment = (data.image || "").split("/").pop();
            const isCenter = data.align === "center";

            // Layout variables to sync with frontend CSS
            const floatValue = isCenter ? "none" : data.align;

            let marginValue = "0.5rem 0 1rem 1.5rem"; // Default Right Margin
            if (data.align === "left") marginValue = "0.5rem 1.5rem 1rem 0";
            if (isCenter) marginValue = "1.5rem auto";

            let widthPercent = "45%";
            if (data.size_class?.includes("small")) widthPercent = "30%";
            if (data.size_class?.includes("large")) widthPercent = "60%";
            if (data.size_class?.includes("full")) widthPercent = "100%";

            return `<div style="float: ${floatValue}; max-width: ${widthPercent}; width: ${widthPercent}; margin: ${marginValue}; box-sizing: border-box; clear: ${isCenter ? "both" : "none"};">
            <img src="${fileFragment}" alt="${data.alt || ""}" style="width:100%; height:auto; display:block; border-radius:6px;"/>
          </div>`;
          },
        });
      }
    </script>
  </body>
</html>
