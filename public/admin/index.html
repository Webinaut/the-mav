<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
    <title>Content Manager</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.1.2/dist/decap-cms.js"></script>
    <script>
      // 1. Create a custom template for your 'articles' collection
      const ArticlesPreview = window.createClass({
        render: function () {
          const entry = this.props.entry;

          // Fetch and resolve the main 'hero' image using Decap's asset proxy wrapper
          const heroField = entry.getIn(["data", "hero"]);
          const resolvedHeroImg = this.props.getAsset(heroField);

          // Use the built-in widgetFor to render the body Markdown.
          // Decap natively resolves inline Markdown images inside widgetFor using its media store!
          const bodyContent = this.props.widgetFor("body");

          return window.h(
            "div",
            { style: { padding: "20px", fontFamily: "sans-serif" } },
            window.h("h1", null, entry.getIn(["data", "title"])),
            window.h(
              "p",
              { style: { fontStyle: "italic", color: "#666" } },
              entry.getIn(["data", "description"]),
            ),

            // Render hero preview image if it exists
            resolvedHeroImg
              ? window.h("img", {
                  src: resolvedHeroImg.toString(),
                  style: {
                    maxWidth: "100%",
                    height: "auto",
                    marginBottom: "10px",
                  },
                })
              : null,

            window.h(
              "p",
              { style: { fontSize: "0.9rem", color: "#888" } },
              entry.getIn(["data", "caption"]),
            ),
            window.h("hr", null),

            // Render body container where inline images live
            window.h("div", { className: "article-body" }, bodyContent),
          );
        },
      });

      // 2. Register the preview template to exactly match your collection name: "articles"
      CMS.registerPreviewTemplate("articles", ArticlesPreview);

      // 3. Netlify Identity Redirection Logic
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", (user) => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
