<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
    <title>Content Manager</title>
    <!-- <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script> -->
  </head>
  <body>
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js">
                        CMS.registerEditorComponent({
        id: 'floated-image',
        label: 'Floated Image',
        icon: 'image',
        fields: [
          { name: 'image', label: 'Select Image', widget: 'image', required: true },
          { name: 'alt', label: 'Alt Text', widget: 'string', required: true },
          {
            name: 'align',
            label: 'Alignment',
            widget: 'select',
            options: [
              { label: 'Float Left', value: 'left' },
              { label: 'Float Right', value: 'right' },
              { label: 'Center', value: 'center' }
            ],
            default: 'right'
          }
        ],

        // Matches either the clean MDX tag OR your old inline span syntax on disk
        pattern: /(?:<FloatedImage\s+([^>]+)\s*\/?>|<span\s+style="float:\s*(left|right)[^>]*">\s*!\[(.*?)\]\((.*?)\)\s*<\/span>)/,

        // Normalizes the captured data layout regardless of how it was originally written
        fromBlock: function(match) {
          // If it matched the old HTML <span> style syntax block
          if (match[2]) {
            return {
              align: match[2],
              alt: match[3],
              image: match[4]
            };
          }

          // Fallback: If it matched the modern MDX component tag format
          const attrs = match[1] || '';
          const srcMatch = attrs.match(/src=["'](.+?)["']/);
          const altMatch = attrs.match(/alt=["'](.*?)["']/);
          const alignMatch = attrs.match(/align=["'](left|right|center)["']/);

          return {
            image: srcMatch ? srcMatch[1] : '',
            alt: altMatch ? altMatch[1] : '',
            align: alignMatch ? alignMatch[1] : 'right'
          };
        },

        // Saves clean, optimized MDX blocks back to your file when editing is finished
        toBlock: function(data) {
          return `<FloatedImage src="${data.image}" alt="${data.alt}" align="${data.align}" />`;
        },

        toPreview: function(data) {
          return `<div style="float: ${data.align}; max-width: 45%; margin: 1em;"><img src="${data.image}" alt="${data.alt}" style="width:100%; display:block;"/></div>`;
        }
      });
    </script>
  </body>
</html>
